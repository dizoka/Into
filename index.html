<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ЛНТУ · калькулятор конкурсного бала</title>
  <style>
    :root{--bg:#0f141b;--panel:#1c222c;--panel2:#242d3a;--text:#edf5f8;--muted:#9fb0bd;--line:#244756;--brand:#178b98;--brand2:#6fd3e0;--green:#11a464;--red:#e45454;--amber:#c48320;--blue:#162081;--card:#eaf8fc;--cardText:#0f2029}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#10151d,#111820 55%,#0d1218);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:18px;line-height:1.35} button,input,select{font:inherit} .top{position:sticky;top:0;z-index:50;background:linear-gradient(90deg,#127f8d,#2d97a5);padding:18px 18px;color:white;font-weight:900;font-size:clamp(23px,5.2vw,38px);box-shadow:0 8px 26px rgba(0,0,0,.25)} .wrap{width:min(1180px,100%);margin:0 auto;padding:20px}.grid{display:grid;grid-template-columns:1fr;gap:18px}@media(min-width:980px){.grid{grid-template-columns:420px 1fr;align-items:start}.left{position:sticky;top:92px}}
    .box{background:rgba(30,37,47,.96);border:1px solid rgba(101,198,214,.22);border-radius:28px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.22)}h1,h2,h3{margin:0 0 14px}h2{font-size:clamp(28px,5vw,44px)} .step{font-weight:900;font-size:clamp(25px,5vw,38px);margin-bottom:14px}.hint{color:var(--muted);font-size:16px}.row{display:grid;grid-template-columns:1fr 115px;gap:12px;align-items:center;margin:12px 0}.row label{font-size:19px}.row input,.row select,.search{width:100%;border:1px solid #38505d;background:#151c25;color:var(--text);border-radius:15px;padding:13px 14px;outline:none}.row input{text-align:center;font-weight:850;font-size:22px}.row input:focus,.row select:focus,.search:focus{border-color:#6fd3e0;box-shadow:0 0 0 3px rgba(111,211,224,.12)}.subject4{grid-template-columns:1fr 115px}.wide{grid-column:1/-1}.btn{border:0;border-radius:18px;padding:15px 18px;background:#2d8796;color:white;font-weight:900;cursor:pointer}.btn:hover{filter:brightness(1.08)}.btn2{background:#253343;color:#95d8e3}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}.status{border:2px dashed rgba(111,211,224,.25);padding:16px;border-radius:20px;color:#9fd0d8;margin-top:18px}.selectWrap{position:relative}.selectButton{display:flex;gap:12px;align-items:center;justify-content:space-between;width:100%;padding:15px 16px;border-radius:18px;background:#1b2430;border:1px solid #27414c;color:var(--text);font-weight:850;cursor:pointer}.badge{display:inline-flex;align-items:center;justify-content:center;background:#151f85;color:white;font-weight:900;border:2px solid #e4eaff;border-radius:9px;padding:2px 9px;min-width:48px;font-size:17px}.dropdown{display:none;position:absolute;left:0;right:0;top:calc(100% + 10px);z-index:100;background:#202731;border:1px solid #264654;border-radius:22px;overflow:hidden;box-shadow:0 28px 70px rgba(0,0,0,.55);max-height:60vh}.dropdown.open{display:block}.dropSearch{padding:14px;border-bottom:1px solid #15252d}.dropList{max-height:calc(60vh - 78px);overflow:auto}.item{display:grid;grid-template-columns:72px 1fr;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.4);cursor:pointer}.item:hover,.item.active{background:#2b3441}.itemTitle{font-weight:900;font-size:21px}.itemSub{color:var(--muted);font-size:16px}.smallpill{display:inline-block;border:1px solid #456474;background:#162731;border-radius:999px;padding:4px 8px;margin:3px 4px 0 0;font-size:13px;color:#aad6dd}.resultList{display:grid;gap:13px}.result{background:#eefdff;color:#10212b;border:1px solid #b9dce7;border-radius:24px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.16)}.result.dark{background:#1d2631;color:var(--text);border-color:#35515f}.resultTop{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}.result h3{font-size:clamp(22px,4.2vw,32px);color:#137686}.result.dark h3{color:#5fd4e5}.program{font-size:18px;color:#247a88}.result.dark .program{color:#9edbe3}.score{font-size:clamp(28px,8vw,58px);font-weight:950;color:#0c7887;letter-spacing:-1px}.result.dark .score{color:#62d4e4}.line2{font-size:clamp(20px,4vw,29px);font-weight:900;color:#0c7887}.passed{color:var(--green);font-weight:950;font-size:clamp(20px,4vw,31px);margin-top:8px}.failed{color:var(--red);font-weight:950;font-size:clamp(20px,4vw,31px);margin-top:8px}.warn{color:var(--amber);font-weight:950;font-size:clamp(20px,4vw,30px);margin-top:8px}.meta{color:#61727d;font-size:15px;margin-top:8px}.result.dark .meta{color:#9eb1bf}table{border-collapse:collapse;width:100%;margin-top:16px;background:white;color:#0e1b24;border-radius:0 0 18px 18px;overflow:hidden}td{border:1px solid #cbe3eb;padding:12px 14px}td:nth-child(2),td:nth-child(3){text-align:center;font-weight:850}.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px;background:#163947;border-radius:18px;padding:14px;color:#d8edf3}.stats div{display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:5px}.stats b{color:white}.empty{padding:22px;border:2px dashed rgba(111,211,224,.25);border-radius:22px;color:#a7c5cc}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid #38505d;background:#1a2631;color:#b4d9df;border-radius:999px;padding:8px 12px;font-weight:850}.tab.active{background:#1d8595;color:white}.compare{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin:12px 0}.mini{background:#111923;border:1px solid #2b4651;border-radius:17px;padding:12px}.mini b{display:block;font-size:23px;color:#77dce9}.loader{display:inline-block;width:18px;height:18px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:white;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="top">ЛНТУ · калькулятор конкурсного бала</div>
  <main class="wrap grid">
    <section class="box left">
      <div class="step">1. Обери пропозицію</div>
      <div class="selectWrap">
        <button class="selectButton" id="offerBtn"><span><span class="badge">Усі</span> Показати всі пропозиції</span><span>⌄</span></button>
        <div class="dropdown" id="dropdown">
          <div class="dropSearch"><input class="search" id="search" placeholder="Пошук: код, спеціальність, освітня програма, ID…"></div>
          <div class="dropList" id="dropList"></div>
        </div>
      </div>
      <p class="hint">Кожна конкурсна пропозиція окрема: освітня програма, форма навчання, ID і мінімальний бюджетний бал не змішуються.</p>
      <div class="step" style="margin-top:18px">2. Введи бали НМТ</div>
      <div class="row"><label>Українська мова</label><input id="ua" type="number" min="0" max="200" value="0"></div>
      <div class="row"><label>Історія України</label><input id="history" type="number" min="0" max="200" value="0"></div>
      <div class="row"><label>Математика</label><input id="math" type="number" min="0" max="200" value="0"></div>
      <div class="row subject4"><label class="wide"><b>4-й предмет</b></label><select id="subject4"><option value="foreign">Іноземна мова</option><option value="literature">Українська література</option><option value="biology">Біологія</option><option value="geography">Географія</option><option value="physics">Фізика</option><option value="chemistry">Хімія</option></select><input id="score4" type="number" min="0" max="200" value="0"></div>
      <div class="row"><label class="wide"><b>Підготовчі курси / ОУ</b></label><select id="ou" class="wide"><option value="0">Немає / не враховувати</option><option value="5">+5</option><option value="10">+10</option><option value="15">+15</option></select></div>
      <button class="btn" id="calcBtn" style="width:100%;margin-top:10px">Розрахувати конкурсний бал</button>
      <div class="actions"><button class="btn btn2" id="resetBtn">Скинути</button><button class="btn btn2" id="reloadBtn">Оновити дані</button></div>
      <div class="status" id="status"><span class="loader"></span> Завантажую пропозиції з Освіта.UA…</div>
    </section>
    <section>
      <div class="tabs"><button class="tab active" data-filter="all">Усі</button><button class="tab" data-filter="pass">Проходиш</button><button class="tab" data-filter="fail">Не вистачає</button><button class="tab" data-filter="nobudget">Без порогу</button></div>
      <div id="summary" class="compare"></div>
      <div id="details"></div>
      <div id="results" class="resultList"></div>
    </section>
  </main>
<script>
const $ = (id)=>document.getElementById(id);
const subjectName = { ua:'Українська мова', history:'Історія України', math:'Математика', literature:'Українська література', foreign:'Іноземна мова', biology:'Біологія', geography:'Географія', physics:'Фізика', chemistry:'Хімія' };
let offers=[], selectedId='all', lastResults=[], currentFilter='all';

function n(v){ return Math.max(0, Math.min(200, Number(v)||0)); }
function fmt(x){ return (x==null || Number.isNaN(x)) ? '—' : Number(x).toFixed(3); }
function fmt1(x){ return (x==null || Number.isNaN(x)) ? '—' : Number(x).toFixed(1); }
function budgetText(o){ return o.stats?.minBudget!=null ? Number(o.stats.minBudget).toFixed(3) : null; }
function getScores(){ return {ua:n($('ua').value), history:n($('history').value), math:n($('math').value), s4:$('subject4').value, score4:n($('score4').value), ou:Number($('ou').value)||0}; }
function hasAnyScore(){ const s=getScores(); return s.ua||s.history||s.math||s.score4; }
function calc(o){
  const s=getScores(), c=o.coeffs || {};
  const k1=Number(c.ua)||0, k2=Number(c.math)||0, k3=Number(c.history)||0, k4=Number(c[s.s4])||0, k4max=Number(c.k4max)||Math.max(Number(c.literature)||0,Number(c.foreign)||0,Number(c.biology)||0,Number(c.geography)||0,Number(c.physics)||0,Number(c.chemistry)||0);
  const denom = k1+k2+k3+((k4+k4max)/2);
  if(!denom) return {base:0,p12:0,k1,k2,k3,k4,k4max,industry:1};
  let base = ((s.ua*k1)+(s.math*k2)+(s.history*k3)+(s.score4*k4))/denom + s.ou;
  base *= Number(o.regionalCoef)||1;
  const industry = Number(o.industryCoef)||1;
  let p12 = base * industry;
  if(p12>200) p12 = 200;
  if(base>200) base = 200;
  return {base, p12, k1,k2,k3,k4,k4max,industry};
}
function passStatus(o,r){ const b=o.stats?.minBudget; if(b==null) return 'nobudget'; return r.p12 >= b || r.base >= b ? 'pass' : 'fail'; }
function offerLabel(o){ return `${o.code} ${o.specialty}`; }
function offerSub(o){ return `${o.program || 'Без назви програми'} · ${o.form || 'форма не вказана'} · ID ${o.id || '—'}`; }

async function load(refresh=false){
  $('status').innerHTML = '<span class="loader"></span> Завантажую пропозиції з Освіта.UA…';
  try{
    const res = await fetch('/api/offers' + (refresh?'?refresh=1':''));
    const data = await res.json();
    offers = data.offers || [];
    $('status').innerHTML = `${data.source==='fallback-expanded'?'⚠️ Fallback, live не відкрився. ':''}Завантажено пропозицій: <b>${offers.length}</b>${data.warning?'<br><span class="hint">'+data.warning+'</span>':''}`;
    renderDropdown(); render();
  }catch(e){ $('status').textContent = 'Не вдалося завантажити дані: '+e.message; }
}
function renderDropdown(){
  const q = $('search').value.trim().toLowerCase();
  const list = $('dropList');
  let arr = offers.filter(o => (`${o.code} ${o.specialty} ${o.program} ${o.form} ${o.id}`).toLowerCase().includes(q));
  list.innerHTML = `<div class="item ${selectedId==='all'?'active':''}" data-id="all"><span class="badge">Усі</span><div><div class="itemTitle">Показати всі пропозиції</div><div class="itemSub">Список усіх конкурсних пропозицій ЛНТУ</div></div></div>` + arr.map(o=>`<div class="item ${selectedId===o.id?'active':''}" data-id="${o.id}"><span class="badge">${o.code}</span><div><div class="itemTitle">${o.specialty}</div><div class="itemSub">${o.program || '—'} · ${o.form || '—'} · ID ${o.id || '—'}</div></div></div>`).join('');
  list.querySelectorAll('.item').forEach(el=>el.onclick=()=>{selectedId=el.dataset.id; updateButton(); $('dropdown').classList.remove('open'); render();});
}
function updateButton(){
  const o=offers.find(x=>x.id===selectedId);
  $('offerBtn').innerHTML = selectedId==='all' ? `<span><span class="badge">Усі</span> Показати всі пропозиції</span><span>⌄</span>` : `<span><span class="badge">${o?.code||''}</span> ${o?o.specialty:'Пропозиція'}</span><span>⌄</span>`;
}
function render(){
  $('details').innerHTML=''; $('results').innerHTML=''; $('summary').innerHTML='';
  if(!hasAnyScore()) { $('results').innerHTML='<div class="empty">Введи свої 4 бали НМТ і натисни “Розрахувати”. За замовчуванням нічого не підставлено.</div>'; return; }
  let arr = selectedId==='all' ? offers : offers.filter(o=>o.id===selectedId);
  lastResults = arr.map(o=>({o,r:calc(o)})).map(x=>({...x,status:passStatus(x.o,x.r)}));
  lastResults.sort((a,b)=>{ const order={pass:0,fail:1,nobudget:2}; return order[a.status]-order[b.status] || (b.r.p12-a.r.p12); });
  const counts = {pass:lastResults.filter(x=>x.status==='pass').length, fail:lastResults.filter(x=>x.status==='fail').length, nobudget:lastResults.filter(x=>x.status==='nobudget').length};
  $('summary').innerHTML = `<div class="mini"><span>Проходиш</span><b>${counts.pass}</b></div><div class="mini"><span>Не вистачає</span><b>${counts.fail}</b></div><div class="mini"><span>Без відкритого порогу</span><b>${counts.nobudget}</b></div><div class="mini"><span>Усього пропозицій</span><b>${lastResults.length}</b></div>`;
  const visible = lastResults.filter(x => currentFilter==='all' || x.status===currentFilter);
  if(selectedId!=='all' && visible[0]) $('details').innerHTML = detailedCard(visible[0].o, visible[0].r, visible[0].status);
  else $('results').innerHTML = visible.map(x=>listCard(x.o,x.r,x.status)).join('') || '<div class="empty">Нічого не знайдено за цим фільтром.</div>';
}
function verdict(o,r,status){
  const b = budgetText(o);
  if(status==='pass') return `<div class="passed">По бюджету проходиш · мін. бюджет: ${b}</div>`;
  if(status==='fail') return `<div class="failed">Не вистачає до бюджету · мін. бюджет: ${b}</div>`;
  return `<div class="warn">Немає відкритого мінімального бюджетного бала саме для цієї пропозиції</div>`;
}
function listCard(o,r,status){
  return `<article class="result ${status==='fail'?'dark':''}"><div class="resultTop"><div><h3><span class="badge">${o.code}</span> ${o.specialty}</h3><div class="program">${o.program || '—'}</div><div class="meta">${o.form || '—'} · ID ${o.id || '—'} · ${o.offerType || ''}</div></div></div><div class="line2">${fmt(r.p12)} <small>(1–2 пріоритети${r.industry>1?' ×1.02':''})</small></div><div class="line2">${fmt(r.base)} <small>(3–10 пріоритети)</small></div>${verdict(o,r,status)}<div class="meta">Джерело порогу: ${o.statsSource || o.legacyUrl || o.url || '—'}</div></article>`;
}
function detailedCard(o,r,status){
  const s=getScores();
  const rows = [
    ['Українська мова',s.ua,r.k1], ['Історія України',s.history,r.k3], ['Математика',s.math,r.k2], [subjectName[s.s4],s.score4,r.k4], ['Підготовчі курси / ОУ',s.ou,'-'], ['Регіональний коефіцієнт','—',Number(o.regionalCoef||1).toFixed(2)], ['Галузевий коефіцієнт','—',Number(o.industryCoef||1).toFixed(2)], ['K4max для формули Освіта.UA','—',r.k4max]
  ];
  const stats=o.stats||{};
  return `<article class="result"><h3><span class="badge">${o.code}</span> ${o.specialty}</h3><div class="program"><b>Назва пропозиції:</b><br>${o.program || '—'}</div><div class="meta">${o.form || '—'} · ID ${o.id || '—'} · ${o.faculty || ''}</div><div class="score">${fmt(r.p12)} <small style="font-size:.46em">(1–2 пріоритети${r.industry>1?' ×1.02':''})</small></div><div class="line2">${fmt(r.base)} <small>(3–10 пріоритети)</small></div>${verdict(o,r,status)}<table>${rows.map(x=>`<tr><td>${x[0]}</td><td>${x[1]}</td><td>${typeof x[2]==='number'?'× '+Number(x[2]).toFixed(2):x[2]}</td></tr>`).join('')}</table><div class="stats"><div><span>Подано заяв</span><b>${stats.submitted??'—'}</b></div><div><span>Заяв на бюджет</span><b>${stats.budgetApplications??'—'}</b></div><div><span>Зараховано на бюджет</span><b>${stats.enrolledBudget??'—'}</b></div><div><span>Мін. бюджет</span><b>${stats.minBudget!=null?Number(stats.minBudget).toFixed(3):'—'}</b></div><div><span>Макс. держзамовлення</span><b>${o.maxState ?? stats.maxState ?? '—'}</b></div><div><span>Ліцензійний обсяг</span><b>${o.license ?? '—'}</b></div></div><p class="hint">Формула як на Освіта.UA: сума балів НМТ × коефіцієнти / (K1+K2+K3+(K4+K4max)/2) + ОУ, далі РК і ГК.</p></article>`;
}
$('offerBtn').onclick=()=> $('dropdown').classList.toggle('open');
$('search').oninput=renderDropdown;
document.addEventListener('click',e=>{ if(!e.target.closest('.selectWrap')) $('dropdown').classList.remove('open'); });
$('calcBtn').onclick=render; $('resetBtn').onclick=()=>{ ['ua','history','math','score4'].forEach(id=>$(id).value=0); $('ou').value=0; selectedId='all'; updateButton(); renderDropdown(); render(); };
$('reloadBtn').onclick=()=>load(true);
['ua','history','math','score4','subject4','ou'].forEach(id=>$(id).addEventListener('input',()=>{}));
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); currentFilter=t.dataset.filter; render();});
load(false);
</script>
</body>
</html>
